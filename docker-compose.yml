version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: veriledger-db
    restart: always
    environment:
      POSTGRES_USER: veriledger_user
      POSTGRES_PASSWORD: veriledger_password
      POSTGRES_DB: veriledger_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - veriledger-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veriledger-backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://veriledger_user:veriledger_password@db:5432/veriledger_db
      - JWT_SECRET=supersecretjwtkeyforveriledger123!
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - STORAGE_PROVIDER=local  # Can be changed to 'gcs' if credentials are set
      - GCS_BUCKET_NAME=
    depends_on:
      - db
    networks:
      - veriledger-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veriledger-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - veriledger-network

volumes:
  pgdata:
  backend-uploads:

networks:
  veriledger-network:
    driver: bridge
